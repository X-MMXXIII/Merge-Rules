# ↓路由规则↓
# 从上到下的顺序匹配，顶部的规则优先级高于其底下的规则
# 推荐按照 domainset -> non_ip -> ip ,确保所有 domainset 或 non_ip 规则组 位于所有的 ip 规则组之前。
rules:
  # 禁用 QUIC | REJECT-DROP YouTube_Domain的UDP443流量
  - AND,((NETWORK,UDP),(DST-PORT,443),(NOT,((OR,((RULE-SET,CN_Domain),(RULE-SET,CN_IP,no-resolve)))))),REJECT-DROP
  # - AND,((NETWORK,UDP),(DST-PORT,443),(OR,((RULE-SET,YouTube_Domain),(RULE-SET,Google_Domain)))),REJECT-DROP

  - RULE-SET,Private_Domain,🟢 DIRECT
  - RULE-SET,Private_IP,🟢 DIRECT,no-resolve

  - RULE-SET,Reject,REJECT
  # - RULE-SET,AD_SET,REJECT    # 使用AdguardHome

  - RULE-SET,MyProxy_Domain,🫶 默认
  - RULE-SET,MyProxy_IP,🫶 默认,no-resolve
  - RULE-SET,MyDirect_Domain,🟢 DIRECT
  - RULE-SET,MyDirect_IP,🟢 DIRECT,no-resolve

  - RULE-SET,Tracker_Domain,🟢 DIRECT

  - RULE-SET,GitHub_Domain,Git|Code
  - RULE-SET,Vercel_Domain,Git|Code
  - RULE-SET,Docker_Domain,Git|Code

  - RULE-SET,AI_Domain,AI|Chat
  - RULE-SET,Telegram_Domain,Telegram

  - RULE-SET,YouTube_Domain,YouTube
  - RULE-SET,Netflix_Domain,!流媒体
  - RULE-SET,Hulu_Domain,!流媒体
  - RULE-SET,HBO_Domain,!流媒体
  - RULE-SET,Disney_Domain,!流媒体
  - RULE-SET,PrimeVideo_Domain,!流媒体

  - RULE-SET,Spotify_Domain,!音乐
  - RULE-SET,Twitter_Domain,!社交
  - RULE-SET,Facebook_Domain,!社交
  - RULE-SET,Instagram_Domain,!社交
  - RULE-SET,Discord_Domain,!社交

  - RULE-SET,TikTok_Domain,TikTok
  - RULE-SET,SpeedTest_Domain,Speedtest

  - RULE-SET,Google_Domain,Google
  - RULE-SET,Apple@CN,Apple
  - RULE-SET,Microsoft@CN,Microsoft

  - RULE-SET,CN_Domain,🟢 DIRECT
  - RULE-SET,Global_Domain,🫶 默认

  - RULE-SET,Telegram_IP,Telegram,no-resolve
  - RULE-SET,Netflix_IP,!流媒体,no-resolve
  - RULE-SET,Twitter_IP,!社交,no-resolve
  - RULE-SET,Google_IP,Google,no-resolve

  - RULE-SET,CN_IP,🟢 DIRECT

  - MATCH,🫶 默认

# ↓路由规则锚点↓
rule-anchor:
  ip: &ip {type: http, behavior: ipcidr, format: mrs, interval: 86400}
  domain: &domain {type: http, behavior: domain, format: mrs, interval: 86400}
  classical: &classical {type: http, behavior: classical, format: yaml, interval: 86400}
  files: &files {type: file, format: yaml, interval: 0}

# ↓规则集↓ 
  # - 不填"path"时会使用 MD5 作为规则集的文件名
  # - "mrs" 仅支持 domain/ipcidr
  # - "classical" 支持路由规则的全部类型(rule-set/sub-rule 除外)
  # - 格式，可选 yaml/text/mrs，默认 yaml
rule-providers:
  MyDirect_Domain:
    <<: *files
    behavior: domain
    path: ./myrules/MyDirectDomain.yaml
  MyDirect_IP:
    <<: *files
    behavior: ipcidr
    path: ./myrules/MyDirectIP.yaml
  MyProxy_Domain:
    <<: *files
    behavior: domain
    path: ./myrules/MyProxyDomain.yaml
  MyProxy_IP:
    <<: *files
    behavior: ipcidr
    path: ./myrules/MyProxyIP.yaml
  Reject:
    <<: *files
    behavior: domain
    path: ./myrules/Reject.yaml
  FakeIP_Filter:
    <<: *files
    behavior: domain
    path: ./myrules/FakeIP_Filter.yaml

  #AD_SET:
  #  <<: *domain
  #  path: ./rules/AD_SET.mrs
  #  url: "https://github.com/hululu1068/AdGuard-Rule/raw/adrules/adrules-mihomo.mrs"

