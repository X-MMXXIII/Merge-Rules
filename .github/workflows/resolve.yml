name: rule merger

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:


jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Set up Mihomo latest
        run: |
          # LATEST_TAG=$(curl -fsSL https://github.com/MetaCubeX/mihomo/releases/latest/download/version.txt)
          # curl -fsSL -o mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.19.27/mihomo-linux-amd64-v1.19.27.gz
          # gunzip mihomo.gz
          sudo mv local/mihomo-linux-amd64-v1.19.27 /usr/local/bin/mihomo
          sudo chmod +x /usr/local/bin/mihomo
          mihomo -v

      - name: Run script
        run: python rule_merger.py

      - name: Clean up
        run: |
          find . -maxdepth 1 ! -name 'output' ! -name '.' ! -name '.git' -exec rm -rf {} +
          mv output/* .
          rm -rf output

      - name: Get current time
        id: time
        run: echo "TIME=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Commit Changes
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 🍻 Up ${{ steps.time.outputs.TIME }}
          branch: release
          skip_dirty_check: true
          push_options: '--force'
          create_branch: true
          skip_fetch: true
          skip_checkout: true
          commit_options: '--allow-empty'

      - name: Delete Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 1